<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Off1</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .reset-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            padding: 20px;
        }
        .reset-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2rem; color: #fff; margin-bottom: 8px; }
        .header p { color: #94a3b8; font-size: 0.95rem; }
        
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }
        .form-group input {
            width: 100%;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 16px 14px 48px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: #3b82f6;
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            outline: none;
        }
        
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }
        .submit-btn:active { transform: translateY(0); }
        
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .success-msg {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="header">
                <h1>Set New Password</h1>
                <p>Enter the code from your email to reset your password.</p>
            </div>

            <div id="error-msg" class="error-msg"></div>
            <div id="success-msg" class="success-msg"></div>

            <form id="reset-form">
                <div class="form-group">
                    <i class="fas fa-key"></i>
                    <input type="text" id="reset-code" placeholder="Secure Reset Token" maxlength="64" required style="text-transform: uppercase;">
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="new-password" placeholder="New Password" required>
                    <div class="password-requirements hidden" id="reset-password-requirements">
                        <div class="strength-bar-container">
                            <div class="strength-bar" id="reset-strength-bar"></div>
                        </div>
                        <div class="requirements-grid">
                            <div class="requirement-item" id="req-length"><i class="far fa-circle"></i> 8+ Characters</div>
                            <div class="requirement-item" id="req-upper"><i class="far fa-circle"></i> 1 Uppercase</div>
                            <div class="requirement-item" id="req-lower"><i class="far fa-circle"></i> 1 Lowercase</div>
                            <div class="requirement-item" id="req-number"><i class="far fa-circle"></i> 1 Number</div>
                            <div class="requirement-item" id="req-special"><i class="far fa-circle"></i> 1 Special (!@#$)</div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <i class="fas fa-shield-halved"></i>
                    <input type="password" id="confirm-password" placeholder="Confirm New Password" required>
                </div>
                <button type="submit" class="submit-btn" id="submit-btn">Reset Password</button>
            </form>

            <a href="login.html" class="back-link">Back to Login</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:5000'
            : (window.location.hostname.endsWith('github.io')
                ? 'https://miasmatical-kellie-quartan.ngrok-free.dev'
                : window.location.origin);

        // =========================================================================
        // 🛠️ SYSTEM MAINTENANCE MODE CONTROLLER & INTERCEPTOR
        // =========================================================================
        // Dynamic styles for animations
        if (!document.getElementById('maintenance-styles')) {
            const style = document.createElement('style');
            style.id = 'maintenance-styles';
            style.textContent = `
                @keyframes pulse {
                    0% { transform: scale(1); opacity: 0.9; }
                    50% { transform: scale(1.03); opacity: 1; filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.6)); }
                    100% { transform: scale(1); opacity: 0.9; }
                }
                @keyframes glow {
                    0% { box-shadow: 0 0 8px rgba(245, 158, 11, 0.4), inset 0 0 4px rgba(245, 158, 11, 0.2); }
                    50% { box-shadow: 0 0 16px rgba(245, 158, 11, 0.7), inset 0 0 8px rgba(245, 158, 11, 0.3); border-color: rgba(245, 158, 11, 0.8); }
                    100% { box-shadow: 0 0 8px rgba(245, 158, 11, 0.4), inset 0 0 4px rgba(245, 158, 11, 0.2); }
                }
            `;
            document.head.appendChild(style);
        }

        function showToast(message, type = 'info') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.style.cssText = 'position: fixed; bottom: 20px; right: 20px; z-index: 100000; display: flex; flex-direction: column; gap: 10px; pointer-events: none;';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.style.cssText = `
                padding: 12px 24px;
                background: rgba(20, 20, 20, 0.85);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                color: #fff;
                border-radius: 8px;
                font-family: 'Inter', sans-serif;
                font-size: 14px;
                font-weight: 500;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
                border: 1px solid ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : 'rgba(255, 255, 255, 0.1)'};
                opacity: 0;
                transform: translateY(20px);
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                pointer-events: auto;
                display: flex;
                align-items: center;
                gap: 8px;
            `;
            toast.innerHTML = `${type === 'success' ? '🟢' : type === 'error' ? '🔴' : 'ℹ️'} ${message}`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateY(0)';
            }, 10);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3500);
        }

        function showMaintenanceOverlay() {
            if (document.getElementById('maintenance-overlay')) return;
            const overlay = document.createElement('div');
            overlay.id = 'maintenance-overlay';
            overlay.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                background: rgba(10, 10, 10, 0.75); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
                z-index: 99999; display: flex; align-items: center; justify-content: center;
                font-family: 'Inter', sans-serif; color: #fff; text-align: center;
                opacity: 0; transition: opacity 0.5s ease;
            `;
            overlay.innerHTML = `
                <div style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.12); padding: 40px; border-radius: 24px; box-shadow: 0 24px 60px rgba(0,0,0,0.65); max-width: 500px; width: 90%; transform: translateY(20px); transition: all 0.5s ease;">
                    <div style="font-size: 72px; margin-bottom: 24px; animation: pulse 2s infinite; display: inline-block;">🛠️</div>
                    <h1 style="font-size: 30px; font-weight: 700; margin-top: 0; margin-bottom: 16px; background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px;">System Under Maintenance</h1>
                    <p style="font-size: 15px; color: rgba(255, 255, 255, 0.65); line-height: 1.6; margin-bottom: 30px;">
                        We are currently executing essential backend maintenance. Standard operations have been temporarily suspended to ensure data consistency and system integrity.
                    </p>
                    <div style="font-size: 13px; color: rgba(255, 255, 255, 0.35); border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 20px;">
                        Authorized team member? <a href="login.html" style="color: #f59e0b; text-decoration: none; font-weight: 600; border-bottom: 1px solid transparent; transition: all 0.2s;" onmouseover="this.style.borderBottom='1px solid #f59e0b'" onmouseout="this.style.borderBottom='1px solid transparent'">Access Login portal</a>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            document.body.style.overflow = 'hidden';

            setTimeout(() => {
                overlay.style.opacity = '1';
                overlay.querySelector('div').style.transform = 'translateY(0)';
            }, 50);
        }

        function hideMaintenanceOverlay() {
            const overlay = document.getElementById('maintenance-overlay');
            if (overlay) {
                overlay.style.opacity = '0';
                overlay.querySelector('div').style.transform = 'translateY(20px)';
                setTimeout(() => {
                    overlay.remove();
                    document.body.style.overflow = '';
                }, 500);
            }
        }

        function showAdminMaintenanceBadge() {
            if (document.getElementById('maintenance-badge')) return;
            const badge = document.createElement('div');
            badge.id = 'maintenance-badge';
            badge.style.cssText = `
                position: fixed; bottom: 20px; left: 20px; z-index: 9999;
                background: rgba(245, 158, 11, 0.12); border: 1px solid rgba(245, 158, 11, 0.4);
                backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
                color: #f59e0b; padding: 10px 18px; border-radius: 50px;
                font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
                display: flex; align-items: center; gap: 8px;
                animation: glow 2s infinite; cursor: help;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
                transition: all 0.3s ease;
            `;
            badge.title = "You are currently accessing the platform under Maintenance Mode Bypass. Some live changes might be in progress.";
            badge.innerHTML = `
                <span style="display: inline-block; width: 8px; height: 8px; background-color: #f59e0b; border-radius: 50%; box-shadow: 0 0 8px #f59e0b;"></span>
                🛠️ Admin: Maintenance Bypass
            `;
            document.body.appendChild(badge);
        }

        function hideAdminMaintenanceBadge() {
            const badge = document.getElementById('maintenance-badge');
            if (badge) badge.remove();
        }

        // Intercept all fetch requests globally
        const originalFetch = window.fetch;
        window.fetch = async function(...args) {
            try {
                const response = await originalFetch(...args);
                if (response.status === 503) {
                    const clone = response.clone();
                    try {
                        const data = await clone.json();
                        if (data && data.error_type === 'maintenance') {
                            const is_admin = localStorage.getItem('off1_is_admin') === 'true';
                            const is_owner = localStorage.getItem('off1_is_owner') === 'true';
                            const role_rank = parseInt(localStorage.getItem('off1_role_rank') || '0', 10);
                            if (!(is_admin || is_owner || role_rank >= 1)) {
                                showMaintenanceOverlay();
                            }
                        }
                    } catch(e) {}
                }
                return response;
            } catch (error) {
                throw error;
            }
        };

        // Sequential keyboard shortcut tracker for Ctrl + Shift + M, A, T
        let shortcutSequence = [];
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey) {
                const key = e.key.toLowerCase();
                if (key === 'm' || key === 'a' || key === 't') {
                    if (key === 'm') {
                        shortcutSequence = ['m'];
                    } else if (key === 'a' && shortcutSequence[0] === 'm' && shortcutSequence.length === 1) {
                        shortcutSequence.push('a');
                    } else if (key === 't' && shortcutSequence[0] === 'm' && shortcutSequence[1] === 'a' && shortcutSequence.length === 2) {
                        shortcutSequence = [];
                        toggleMaintenanceMode();
                    } else {
                        shortcutSequence = [];
                    }
                } else {
                    shortcutSequence = [];
                }
            } else {
                shortcutSequence = [];
            }
        });

        async function toggleMaintenanceMode() {
            const token = localStorage.getItem('off1_token');
            try {
                const res = await originalFetch(`${API_BASE_URL}/api/toggle_maintenance`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Token': token || ''
                    },
                    body: JSON.stringify({ token: token || '' })
                });
                const data = await res.json();
                if (res.ok && data.status === 'success') {
                    showToast(`System Maintenance: ${data.maintenance_mode ? 'ENABLED' : 'DISABLED'}`, 'success');
                    checkMaintenanceStatus();
                } else {
                    showToast(data.message || 'Failed to toggle maintenance mode.', 'error');
                }
            } catch (err) {
                console.error('Error toggling maintenance mode:', err);
                showToast('Network error while toggling maintenance mode.', 'error');
            }
        }

        async function checkMaintenanceStatus() {
            try {
                const res = await originalFetch(`${API_BASE_URL}/api/status`);
                if (!res.ok) {
                    showMaintenanceOverlay();
                    hideAdminMaintenanceBadge();
                    return;
                }
                const data = await res.json();
                if (data.maintenance_mode) {
                    const is_admin = localStorage.getItem('off1_is_admin') === 'true';
                    const is_owner = localStorage.getItem('off1_is_owner') === 'true';
                    const role_rank = parseInt(localStorage.getItem('off1_role_rank') || '0', 10);
                    
                    if (is_admin || is_owner || role_rank >= 1) {
                        showAdminMaintenanceBadge();
                        hideMaintenanceOverlay();
                    } else {
                        showMaintenanceOverlay();
                        hideAdminMaintenanceBadge();
                    }
                } else {
                    hideMaintenanceOverlay();
                    hideAdminMaintenanceBadge();
                }
            } catch (err) {
                console.error('Error checking maintenance status:', err);
                showMaintenanceOverlay();
                hideAdminMaintenanceBadge();
            }
        }

        // Initial check and periodic poll (every 15s)
        checkMaintenanceStatus();
        setInterval(checkMaintenanceStatus, 15000);

        const resetForm = document.getElementById('reset-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        
        const passwordInput = document.getElementById('new-password');
        const resetReqs = document.getElementById('reset-password-requirements');
        const resetStrength = document.getElementById('reset-strength-bar');
        const resetCriteria = {
            length: document.getElementById('req-length'),
            upper: document.getElementById('req-upper'),
            lower: document.getElementById('req-lower'),
            number: document.getElementById('req-number'),
            special: document.getElementById('req-special')
        };

        function checkPasswordStrength(val) {
            const checks = {
                length: val.length >= 8,
                upper: /[A-Z]/.test(val),
                lower: /[a-z]/.test(val),
                number: /[0-9]/.test(val),
                special: /[^a-zA-Z0-9]/.test(val)
            };

            let metCount = 0;
            for (const [key, met] of Object.entries(checks)) {
                const el = resetCriteria[key];
                if (el) {
                    const icon = el.querySelector('i');
                    if (met) {
                        el.classList.add('met');
                        if (icon) icon.className = 'fas fa-check-circle';
                        metCount++;
                    } else {
                        el.classList.remove('met');
                        if (icon) icon.className = 'far fa-circle';
                    }
                }
            }

            if (resetStrength) {
                const pct = (metCount / 5) * 100;
                resetStrength.style.width = `${pct}%`;
                if (metCount <= 2) {
                    resetStrength.style.backgroundColor = '#ef4444';
                } else if (metCount <= 4) {
                    resetStrength.style.backgroundColor = '#fbbf24';
                } else {
                    resetStrength.style.backgroundColor = '#10b981';
                }
            }

            return metCount === 5;
        }

        passwordInput.addEventListener('focus', () => {
            resetReqs.classList.add('visible');
            resetReqs.classList.remove('hidden');
        });

        passwordInput.addEventListener('blur', () => {
            if (passwordInput.value.length === 0) {
                resetReqs.classList.remove('visible');
                resetReqs.classList.add('hidden');
            }
        });

        passwordInput.addEventListener('input', () => {
            resetReqs.classList.add('visible');
            resetReqs.classList.remove('hidden');
            checkPasswordStrength(passwordInput.value);
        });

        // Enforce secure access via email link
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        if (!urlToken) {
            // Show access denied error and hide form
            document.getElementById('reset-form').style.display = 'none';
            document.querySelector('.header h1').textContent = 'Access Denied';
            document.querySelector('.header p').textContent = 'This page is only accessible via the secure link sent to your email.';
            showError("Direct access to this page is disabled to prevent unauthorized password reset attempts.");
        } else {
            // Prefill and hide the code input field since the secure token is provided via URL
            const codeInput = document.getElementById('reset-code');
            codeInput.value = urlToken;
            codeInput.closest('.form-group').style.display = 'none';
            document.querySelector('.header p').textContent = 'Please enter and confirm your new secure password below.';
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('reset-code').value.trim().toUpperCase();
            const password = passwordInput.value;
            const confirm = document.getElementById('confirm-password').value;

            if (password !== confirm) {
                showError("Passwords do not match");
                return;
            }

            if (!checkPasswordStrength(password)) {
                showError("Password does not meet all strength requirements.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE_URL}/api/reset_password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ token: code, password: password })
                });

                const data = await response.json();
                if (response.ok) {
                    successMsg.textContent = "Password updated successfully!";
                    successMsg.style.display = 'block';
                    resetForm.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showError(data.message || "Reset failed. Check your code.");
                }
            } catch (err) {
                showError("Server connection failed.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }
    </script>
</body>
</html>
