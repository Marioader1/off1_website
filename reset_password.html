<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Off1</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .reset-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            padding: 20px;
        }
        .reset-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2rem; color: #fff; margin-bottom: 8px; }
        .header p { color: #94a3b8; font-size: 0.95rem; }
        
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }
        .form-group input {
            width: 100%;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 16px 14px 48px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: #3b82f6;
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            outline: none;
        }
        
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }
        .submit-btn:active { transform: translateY(0); }
        
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .success-msg {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="header">
                <h1>Set New Password</h1>
                <p>Enter the code from your email to reset your password.</p>
            </div>

            <div id="error-msg" class="error-msg"></div>
            <div id="success-msg" class="success-msg"></div>

            <form id="reset-form">
                <div class="form-group">
                    <i class="fas fa-key"></i>
                    <input type="text" id="reset-code" placeholder="Secure Reset Token" maxlength="64" required style="text-transform: uppercase;">
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="new-password" placeholder="New Password" required>
                    <div class="password-requirements hidden" id="reset-password-requirements">
                        <div class="strength-bar-container">
                            <div class="strength-bar" id="reset-strength-bar"></div>
                        </div>
                        <div class="requirements-grid">
                            <div class="requirement-item" id="req-length"><i class="far fa-circle"></i> 8+ Characters</div>
                            <div class="requirement-item" id="req-upper"><i class="far fa-circle"></i> 1 Uppercase</div>
                            <div class="requirement-item" id="req-lower"><i class="far fa-circle"></i> 1 Lowercase</div>
                            <div class="requirement-item" id="req-number"><i class="far fa-circle"></i> 1 Number</div>
                            <div class="requirement-item" id="req-special"><i class="far fa-circle"></i> 1 Special (!@#$)</div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <i class="fas fa-shield-halved"></i>
                    <input type="password" id="confirm-password" placeholder="Confirm New Password" required>
                </div>
                <button type="submit" class="submit-btn" id="submit-btn">Reset Password</button>
            </form>

            <a href="login.html" class="back-link">Back to Login</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:5000'
            : (window.location.hostname.endsWith('github.io')
                ? 'https://miasmatical-kellie-quartan.ngrok-free.dev'
                : window.location.origin);



        const resetForm = document.getElementById('reset-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        
        const passwordInput = document.getElementById('new-password');
        const resetReqs = document.getElementById('reset-password-requirements');
        const resetStrength = document.getElementById('reset-strength-bar');
        const resetCriteria = {
            length: document.getElementById('req-length'),
            upper: document.getElementById('req-upper'),
            lower: document.getElementById('req-lower'),
            number: document.getElementById('req-number'),
            special: document.getElementById('req-special')
        };

        function checkPasswordStrength(val) {
            const checks = {
                length: val.length >= 8,
                upper: /[A-Z]/.test(val),
                lower: /[a-z]/.test(val),
                number: /[0-9]/.test(val),
                special: /[^a-zA-Z0-9]/.test(val)
            };

            let metCount = 0;
            for (const [key, met] of Object.entries(checks)) {
                const el = resetCriteria[key];
                if (el) {
                    const icon = el.querySelector('i');
                    if (met) {
                        el.classList.add('met');
                        if (icon) icon.className = 'fas fa-check-circle';
                        metCount++;
                    } else {
                        el.classList.remove('met');
                        if (icon) icon.className = 'far fa-circle';
                    }
                }
            }

            if (resetStrength) {
                const pct = (metCount / 5) * 100;
                resetStrength.style.width = `${pct}%`;
                if (metCount <= 2) {
                    resetStrength.style.backgroundColor = '#ef4444';
                } else if (metCount <= 4) {
                    resetStrength.style.backgroundColor = '#fbbf24';
                } else {
                    resetStrength.style.backgroundColor = '#10b981';
                }
            }

            return metCount === 5;
        }

        passwordInput.addEventListener('focus', () => {
            resetReqs.classList.add('visible');
            resetReqs.classList.remove('hidden');
        });

        passwordInput.addEventListener('blur', () => {
            if (passwordInput.value.length === 0) {
                resetReqs.classList.remove('visible');
                resetReqs.classList.add('hidden');
            }
        });

        passwordInput.addEventListener('input', () => {
            resetReqs.classList.add('visible');
            resetReqs.classList.remove('hidden');
            checkPasswordStrength(passwordInput.value);
        });

        // Enforce secure access via email link
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        if (!urlToken) {
            // Show access denied error and hide form
            document.getElementById('reset-form').style.display = 'none';
            document.querySelector('.header h1').textContent = 'Access Denied';
            document.querySelector('.header p').textContent = 'This page is only accessible via the secure link sent to your email.';
            showError("Direct access to this page is disabled to prevent unauthorized password reset attempts.");
        } else {
            // Prefill and hide the code input field since the secure token is provided via URL
            const codeInput = document.getElementById('reset-code');
            codeInput.value = urlToken;
            codeInput.closest('.form-group').style.display = 'none';
            document.querySelector('.header p').textContent = 'Please enter and confirm your new secure password below.';
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('reset-code').value.trim().toUpperCase();
            const password = passwordInput.value;
            const confirm = document.getElementById('confirm-password').value;

            if (password !== confirm) {
                showError("Passwords do not match");
                return;
            }

            if (!checkPasswordStrength(password)) {
                showError("Password does not meet all strength requirements.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE_URL}/api/reset_password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ token: code, password: password })
                });

                const data = await response.json();
                if (response.ok) {
                    successMsg.textContent = "Password updated successfully!";
                    successMsg.style.display = 'block';
                    resetForm.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showError(data.message || "Reset failed. Check your code.");
                }
            } catch (err) {
                showError("Server connection failed.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }
    </script>

    <!-- Vercel Speed Insights -->
    <script>
      window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
